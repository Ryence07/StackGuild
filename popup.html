<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StackGuild</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-logo">
      <img src="icons/icon48.png" alt="StackGuild" class="header-icon" />
      <div>
        <h1 class="header-title">StackGuild</h1>
        <p class="header-sub">Price Monitor</p>
      </div>
    </div>
    <button id="btn-settings" class="btn-icon" title="Settings">⚙️</button>
  </header>

  <!-- ===== CURRENT PRODUCT PANEL ===== -->
  <section id="panel-current" class="panel hidden">
    <div class="product-card">
      <img id="product-image" src="" alt="" class="product-img" />
      <div class="product-info">
        <p id="product-platform" class="platform-badge"></p>
        <p id="product-title" class="product-title"></p>
        <p id="product-price" class="product-price"></p>
      </div>
    </div>

    <div class="target-row">
      <label for="input-target">🎯 Target Price (₱)</label>
      <input type="number" id="input-target" placeholder="e.g. 999" min="1" step="1" />
    </div>

    <div class="btn-row">
      <button id="btn-track" class="btn btn-primary">📌 Track This Product</button>
      <button id="btn-untrack" class="btn btn-danger hidden">🗑 Stop Tracking</button>
    </div>

    <div id="track-status" class="status-msg hidden"></div>

    <!-- Price History Chart -->
    <div id="chart-section" class="hidden">
      <h3 class="section-title">📈 Price History (Last 30 Days)</h3>
      <canvas id="price-chart" width="320" height="150"></canvas>
    </div>
  </section>

  <!-- ===== NOT ON A PRODUCT PAGE ===== -->
  <section id="panel-nopage" class="panel hidden">
    <div class="empty-state">
      <p class="empty-icon">🛒</p>
      <p class="empty-title">Open a product page</p>
      <p class="empty-sub">Visit a product on Shopee PH or Lazada PH to start tracking.</p>
    </div>
  </section>

  <!-- ===== TRACKED PRODUCTS LIST ===== -->
  <section id="panel-list" class="panel">
    <div class="section-header">
      <h3 class="section-title">📋 Tracked Products</h3>
      <span id="product-count" class="badge">0</span>
    </div>
    <div id="products-list" class="products-list">
      <div class="empty-state">
        <p class="empty-icon">📦</p>
        <p class="empty-title">No tracked products yet</p>
        <p class="empty-sub">Visit a Shopee or Lazada product page and click Track.</p>
      </div>
    </div>
  </section>

  <!-- ===== SETTINGS PANEL ===== -->
  <section id="panel-settings" class="panel hidden">
    <h3 class="section-title">⚙️ Settings</h3>

    <div class="setting-row">
      <label>Check interval (minutes)</label>
      <input type="number" id="input-interval" value="60" min="30" max="1440" step="30" />
    </div>

    <div class="setting-row">
      <label>Notifications</label>
      <input type="checkbox" id="toggle-notif" checked />
    </div>

    <div class="btn-row">
      <button id="btn-save-settings" class="btn btn-primary">💾 Save Settings</button>
      <button id="btn-export" class="btn btn-secondary">📤 Export Data</button>
    </div>

    <div id="settings-msg" class="status-msg hidden"></div>
    <button id="btn-back" class="btn btn-ghost mt-8">← Back</button>
  </section>

  <script src="popup.js" type="module"></script>
</body>
</html>
